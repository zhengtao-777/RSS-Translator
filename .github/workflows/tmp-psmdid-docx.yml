name: tmp-build-psmdid-docx

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'tmp/docx_build/**'
      - '.github/workflows/tmp-psmdid-docx.yml'

jobs:
  build-docx-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate DOCX package files
        run: python tmp/docx_build/generate_psmdid_docx.py
      - name: Upload DOCX package as artifact ZIP
        uses: actions/upload-artifact@v4
        with:
          name: psmdid-docx-package
          path: tmp/docx_build/docx_package/
          include-hidden-files: true
          if-no-files-found: error
          compression-level: 0
